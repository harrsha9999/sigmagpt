<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SigmaGPT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 20px; border-bottom: 1px solid #30363d; }
    header h1 { font-size: 1.2rem; } header .sub { color: #8b949e; font-size: 0.8rem; }
    #log { flex: 1; overflow-y: auto; padding: 20px; max-width: 820px; margin: 0 auto; width: 100%; }
    .msg { margin-bottom: 14px; display: flex; gap: 10px; }
    .msg .who { font-size: 0.75rem; color: #8b949e; width: 60px; flex-shrink: 0; padding-top: 3px; }
    .bubble { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 10px 14px; }
    .msg.user .bubble { background: #1f6feb22; border-color: #1f6feb55; }
    .meta { font-size: 0.72rem; color: #8b949e; margin-left: 70px; margin-bottom: 14px; }
    form { display: flex; gap: 10px; padding: 16px 20px; border-top: 1px solid #30363d; max-width: 820px; margin: 0 auto; width: 100%; }
    input { flex: 1; background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px; padding: 11px 14px; }
    button { background: #238636; color: #fff; border: 0; border-radius: 8px; padding: 0 20px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <h1>SigmaGPT</h1>
    <div class="sub">Multi-turn chat · bounded context + response caching</div>
  </header>
  <div id="log"></div>
  <form id="form">
    <input id="input" placeholder="Type a message..." autocomplete="off" />
    <button>Send</button>
  </form>

  <script>
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const history = [{ role: "system", content: "You are SigmaGPT, a concise helpful assistant." }];

    function add(role, content) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.innerHTML = `<div class="who">${role}</div><div class="bubble"></div>`;
      div.querySelector(".bubble").textContent = content;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }
    function meta(text) {
      const d = document.createElement("div");
      d.className = "meta"; d.textContent = text;
      log.appendChild(d); log.scrollTop = log.scrollHeight;
    }

    form.onsubmit = async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      add("user", text);
      history.push({ role: "user", content: text });
      input.value = "";

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      if (!res.ok) { add("assistant", data.error || "error"); return; }
      add("assistant", data.reply);
      history.push({ role: "assistant", content: data.reply });
      meta(`~${data.estimatedTokens} ctx tokens${data.truncated ? " · context truncated" : ""}${data.cached ? " · cache hit" : ""}`);
    };
  </script>
</body>
</html>
